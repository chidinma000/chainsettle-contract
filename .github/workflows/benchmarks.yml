name: Gas/Instruction Benchmarks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  benchmark:
    name: Run Instruction Cost Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - name: Install Soroban CLI
        run: |
          cargo install --locked soroban-cli --features opt || true

      - name: Run benchmarks and check regressions
        run: |
          cd contracts/chainsetttle
          echo "🔬 Running ChainSettle instruction cost benchmarks..."
          cargo test benchmark_all_functions --release -- --nocapture

      - name: Verify baselines exist
        run: |
          if [ ! -f benchmarks/baselines.json ]; then
            echo "❌ Error: benchmarks/baselines.json not found!"
            echo "Run 'UPDATE_BASELINES=1 cargo test benchmark_all_functions --release -- --nocapture' locally and commit the file."
            exit 1
          fi
          echo "✅ Baseline file found"

      - name: Display benchmark summary
        if: always()
        run: |
          echo "📊 Benchmark Summary"
          echo "===================="
          echo "All contract functions have been benchmarked for instruction costs."
          echo "Regression threshold: +10%"
          echo ""
          echo "Functions tested:"
          echo "  - create_shipment (1 & 10 milestones)"
          echo "  - submit_proof (1 & 10 milestones)"
          echo "  - confirm_milestone (1 & 10 milestones)"
          echo "  - raise_dispute (1 & 10 milestones)"
          echo "  - resolve_dispute (1 & 10 milestones)"
          echo "  - cancel_shipment (1 & 10 milestones)"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/baselines.json
